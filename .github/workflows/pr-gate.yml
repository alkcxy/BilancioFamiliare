name: PR Merge Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - master

jobs:
  test:
    name: Run Rails tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mariadb:10.5
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bilancio_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_HOST: 127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y default-libmysqlclient-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler: 'latest'
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Build Vite assets
        run: bin/vite build --mode test

      - name: Setup test database
        run: bin/rails db:schema:load

      - name: Run tests
        run: bin/rails test
        timeout-minutes: 15

  check-pr-title:
    name: Verify PR title follows conventions
    runs-on: ubuntu-latest

    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            test
            chore
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern.
            Please ensure that the subject starts with an uppercase character.
        continue-on-error: true
