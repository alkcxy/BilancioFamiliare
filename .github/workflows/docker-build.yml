name: Build and Push Docker Image

# Docker images are built:
# 1. Automatically: push to master or tags v*
# 2. Manually: add 'build-docker' label to PR (builds with branch name)
on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    types: [labeled]
    branches:
      - master

env:
  REGISTRY: docker.io
  IMAGE_NAME: alkcxy/bilancio

jobs:
  test:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'build-docker'))

    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: printf 'MYSQL_USER=root\nMYSQL_PASSWORD=root\nMYSQL_HOST=db\n' > .env

      - name: Configure bundler to use vendor/bundle
        run: |
          mkdir -p .bundle
          printf 'BUNDLE_PATH: "vendor/bundle"\nBUNDLE_JOBS: "4"\nBUNDLE_RETRY: "3"\n' > .bundle/config

      - name: Cache gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('Gemfile.lock') }}
          restore-keys: ${{ runner.os }}-gems-

      - name: Start database
        run: docker compose up -d db

      - name: Build web image
        run: docker compose build web

      - name: Install gems
        run: docker compose run --rm web bundle install

      - name: Wait for database
        run: |
          until docker compose exec -T db mysqladmin ping -uroot -proot --silent; do
            sleep 2
          done

      - name: Setup test database
        run: docker compose run --rm web bin/rails db:create db:schema:load RAILS_ENV=test

      - name: Run tests
        run: docker compose run --rm web bin/rails test
        timeout-minutes: 15

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine branch name for tagging
        id: branch
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "name=${{ github.head_ref }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_type }}" == "tag" ]; then
            echo "name=tag" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.branch.outputs.name }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"

  cleanup:
    runs-on: ubuntu-latest
    needs: [test, build-and-push]
    if: always() && github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'build-docker')
    permissions:
      pull-requests: write

    steps:
      - name: Remove build-docker label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'build-docker'
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }
