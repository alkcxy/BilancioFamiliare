name: Run Tests

# Manual test execution only - automatic tests are handled by:
# - docker-build.yml (on push to master or tags v*)
# - pr-gate.yml (on pull requests to master)
on:
  pull_request:
    branches:
      - master
    types: [labeled]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-tests'))

    services:
      mysql:
        image: mariadb:10.5
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bilancio_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_HOST: 127.0.0.1

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get install -y default-libmysqlclient-dev

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler: 'latest'
          bundler-cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile

      - name: Build Vite assets
        run: bin/vite build --mode test

      - name: Setup test database
        run: bin/rails db:schema:load

      - name: Run tests
        run: bin/rails test

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: log/test.log

  cleanup:
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-tests')
    permissions:
      pull-requests: write

    steps:
      - name: Remove run-tests label
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'run-tests'
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }
